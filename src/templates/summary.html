{% extends "layout.html" %}
{% block content %}

<div id="conn-banner" class="conn-banner"></div>

<div id="context-list">
  {% if contexts|length == 0 %}
    <div class="empty-state">
      <p>No active browser contexts.</p>
      <p style="margin-top: 0.5rem; font-size: 0.85rem;">
        Create one via the API: <code>POST /api/contexts</code>
      </p>
    </div>
  {% else %}
    <div class="grid">
      {% for ctx in contexts %}
        {% include "partials/context_card.html" %}
      {% endfor %}
    </div>
  {% endif %}
</div>

<script>
  (function() {
    var conns = {};
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';

    function connectCard(card) {
      var id = card.id.replace('ctx-', '');
      if (conns[id]) return;
      var img = card.querySelector('.card-thumb');
      if (!img) return;
      conns[id] = liveScreenshot(
        proto + '//' + location.host + '/ws/screenshots/' + id,
        function(blob) {
          var url = URL.createObjectURL(blob);
          img.onload = function() { URL.revokeObjectURL(url); };
          img.src = url;
        },
        function(state) { card.setAttribute('data-conn', state); }
      );
    }

    function sync() {
      var cards = document.querySelectorAll('#context-list .card');
      var active = {};
      cards.forEach(function(card) {
        var id = card.id.replace('ctx-', '');
        active[id] = true;
        connectCard(card);
      });
      for (var id in conns) {
        if (!active[id]) {
          conns[id].close();
          delete conns[id];
        }
      }
    }

    function refresh() {
      fetch('/partials/context-list')
        .then(function(r) { return r.text(); })
        .then(function(html) {
          document.getElementById('context-list').innerHTML = html;
          sync();
        })
        .catch(function() {});
    }

    sync();

    var banner = document.getElementById('conn-banner');
    liveUpdates('/sse/updates', ['context:created', 'context:destroyed'],
      function() { refresh(); },
      function(state) { banner.setAttribute('data-conn', state); }
    );
  })();
</script>

{% endblock %}
